name: Build and Publish gtkwave4 Bottles

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_FROM_API: 1

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Link local repo as tap
        run: |
          mkdir -p /opt/homebrew/Library/Taps/jasonhowk
          ln -s $GITHUB_WORKSPACE /opt/homebrew/Library/Taps/jasonhowk/homebrew-eda-tools

      - name: Build bottle and upload to release
        run: |
          brew install --build-bottle jasonhowk/eda-tools/gtkwave4
          brew bottle --json jasonhowk/eda-tools/gtkwave4
          formula_version=$(jq -r '.[].formula.pkg_version' *.json)
          release_tag="gtkwave4-${formula_version}"
          local_file=$(jq -r '.[].bottle.tags[].local_filename' *.json)
          upload_file="${local_file/--/-}"
          cp "$local_file" "$upload_file"
          echo "Version:   $formula_version"
          echo "Tag:       $release_tag"
          echo "Uploading: $upload_file"
          ls -la *.tar.gz
          gh release delete "$release_tag" --repo jasonhowk/homebrew-eda-tools --yes 2>/dev/null || true
          gh release create "$release_tag" --repo jasonhowk/homebrew-eda-tools --title "gtkwave4 ${formula_version}" --notes "Bottles for gtkwave4 ${formula_version}"
          gh release upload "$release_tag" "$upload_file" --repo jasonhowk/homebrew-eda-tools
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
